<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적서 자동화 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ── 툴바 ── -->
<div class="toolbar" id="toolbar">

  <!-- 좌측: 로고 + 타이틀 -->
  <div class="toolbar-left">
    <div class="toolbar-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2.2" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="21" x2="9" y2="9"/>
      </svg>
    </div>
    견적서 자동화 시스템
    <div class="toolbar-divider"></div>
    <span class="toolbar-sub">Baron Consultants</span>
  </div>

  <!-- 우측: 컨트롤 -->
  <div class="toolbar-right">

    <!-- 법인 선택 -->
    <select id="companySelect" class="toolbar-select" onchange="switchCompany(this.value)">
      <option value="baron">바론컨설턴트</option>
      <option value="jh">장헌</option>
    </select>

    <!-- 양식 토글 -->
    <div class="layout-toggle">
      <button id="tab-typeA" class="active" onclick="switchLayout('A')">일반</button>
      <button id="tab-typeB" onclick="switchLayout('B')">기술용역</button>
    </div>

    <div class="toolbar-sep"></div>

    <!-- 액션 그룹: 아이콘 버튼 -->
    <div class="toolbar-actions">
      <button class="icon-btn" onclick="resetForm()" data-tooltip="초기화">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button class="icon-btn" onclick="window.open('https://docs.google.com/spreadsheets/d/1ZaUrfvkMeOD7zeDRdo-xKy6jakvuICCTXg9Z6krKJfg/edit?gid=0#gid=0', '_blank')" data-tooltip="DB 관리">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      </button>
    </div>

    <div class="toolbar-sep"></div>

    <!-- 내보내기 드롭다운 -->
    <div class="dropdown">
      <button class="btn btn-export" onclick="toggleExportMenu(event)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        내보내기
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-left:2px; opacity:0.7"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="dropdown-content">
        <button id="btnPDF" onclick="downloadPDF()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          PDF 저장
        </button>
        <button onclick="downloadExcel()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
          Excel 다운로드
        </button>
      </div>
    </div>

  </div>
</div>

<!-- ── 메인 ── -->
<div class="main" style="position:relative">

  <div class="doc" id="docArea">
    <!-- 내용은 JS로 렌더링 -->
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
